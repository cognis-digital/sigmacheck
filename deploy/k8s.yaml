apiVersion: apps/v1
kind: Deployment
metadata: { name: sigmacheck, labels: { app: sigmacheck } }
spec:
  replicas: 1
  selector: { matchLabels: { app: sigmacheck } }
  template:
    metadata: { labels: { app: sigmacheck } }
    spec:
      containers:
        - name: sigmacheck
          image: ghcr.io/cognis-digital/sigmacheck:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: sigmacheck }
spec:
  selector: { app: sigmacheck }
  ports: [{ port: 80, targetPort: 8000 }]
