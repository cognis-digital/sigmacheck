title: Kubernetes Privileged Pod Exec
id: a1b2c3d4-e5f6-4789-9a0b-1c2d3e4f5061
status: test
description: Detects an exec into a privileged container in a Kubernetes audit
    log. Exercises quantifier syntax (1 of selection*) and regex matching.
tags:
    - attack.execution
    - attack.t1609
logsource:
    product: kubernetes
    service: audit
detection:
    selection_verb:
        verb: 'create'
        objectRef.subresource: 'exec'
    selection_priv_a:
        requestObject.spec.containers.securityContext.privileged: true
    selection_priv_b:
        annotations|re: '.*privileged.*true.*'
    condition: selection_verb and 1 of selection_priv*
level: high
tests:
    positive:
        - verb: 'create'
          'objectRef.subresource': 'exec'
          'requestObject.spec.containers.securityContext.privileged': true
        - verb: 'create'
          'objectRef.subresource': 'exec'
          annotations: 'pod-security: privileged=true allowed'
    negative:
        - verb: 'get'
          'objectRef.subresource': 'exec'
          'requestObject.spec.containers.securityContext.privileged': true
        - verb: 'create'
          'objectRef.subresource': 'exec'
          'requestObject.spec.containers.securityContext.privileged': false
          annotations: 'restricted'
